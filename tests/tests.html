<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Portfolio -- Unit Tests</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f5f7fa;
      color: #1a1a2e;
      padding: 2rem;
    }
    h1 {
      font-size: 1.5rem;
      margin-bottom: 0.25rem;
      color: #4285F4;
    }
    .subtitle {
      font-size: 0.9rem;
      color: #666;
      margin-bottom: 1.5rem;
    }
    #test-status {
      font-size: 0.95rem;
      color: #555;
      margin-bottom: 1rem;
    }

    /* Summary bar */
    .summary {
      display: flex;
      gap: 1.5rem;
      padding: 1rem 1.25rem;
      border-radius: 8px;
      margin-bottom: 1.5rem;
      font-weight: 600;
      font-size: 1rem;
    }
    .summary.all-pass { background: #e6f4ea; border: 1px solid #34a853; }
    .summary.has-failures { background: #fce8e6; border: 1px solid #ea4335; }
    .pass-count { color: #1e7e34; }
    .fail-count { color: #c62828; }
    .total-count { color: #555; }

    /* Suites */
    .suite {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      margin-bottom: 1rem;
      overflow: hidden;
    }
    .suite h2 {
      font-size: 1rem;
      padding: 0.75rem 1rem;
      background: #4285F4;
      color: #fff;
    }

    /* Individual test row */
    .test-row {
      padding: 0.5rem 1rem;
      border-bottom: 1px solid #eee;
      font-size: 0.9rem;
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
    }
    .test-row:last-child { border-bottom: none; }
    .test-row.pass .icon {
      color: #1e7e34;
      font-weight: 700;
      font-size: 0.8rem;
      min-width: 36px;
    }
    .test-row.fail .icon {
      color: #c62828;
      font-weight: 700;
      font-size: 0.8rem;
      min-width: 36px;
    }
    .test-row.fail {
      background: #fff5f5;
    }
    .test-name { flex: 1; }
    .detail {
      color: #c62828;
      font-size: 0.8rem;
      max-width: 50%;
      word-break: break-word;
    }
  </style>
</head>
<body>

  <h1>Student Portfolio -- Unit Tests</h1>
  <p class="subtitle">Browser-based test suite for auth.js, api.js, and DOM modules</p>

  <div id="test-status">Loading scripts...</div>
  <div id="test-summary" class="summary" style="display:none;"></div>
  <div id="test-results"></div>

  <!-- Load project scripts in dependency order -->
  <script src="../data/careers-data.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/api.js"></script>

  <!-- Test logic -->
  <script src="tests.js"></script>

  <script>
    // Unhide summary once tests render
    const _observer = new MutationObserver(() => {
      const s = document.getElementById("test-summary");
      if (s && s.innerHTML.trim()) { s.style.display = "flex"; _observer.disconnect(); }
    });
    _observer.observe(document.getElementById("test-summary"), { childList: true, characterData: true, subtree: true });
  </script>

</body>
</html>
